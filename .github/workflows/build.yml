name: Build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build all variants
        run: ./gradlew chiseledBuild

      - name: Collect JARs
        run: |
          mkdir -p artifacts
          for dir in versions/*/build/libs; do
            variant=$(echo "$dir" | cut -d/ -f2)
            for jar in "$dir"/*.jar; do
              [ -f "$jar" ] || continue
              base=$(basename "$jar" .jar)
              if [[ "$jar" == *-sources.jar ]]; then
                cp "$jar" "artifacts/${base%-sources}-${variant}-sources.jar"
              else
                cp "$jar" "artifacts/${base}-${variant}.jar"
              fi
            done
          done

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.jar
          generate_release_notes: true
